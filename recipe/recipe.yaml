schema_version: 1

context:
  name: onnx
  version: "1.22.0rc1"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  # 1.22.0 has no GitHub release tag yet (only the rel-1.22.0 branch); use the
  # official PyPI sdist for the release candidate. See ISSUES.md / issue #147.
  url: https://pypi.org/packages/source/o/onnx/onnx-${{ version }}.tar.gz
  sha256: 7799c0762c3ef6cfcb65f2eb5415ba1e527207c5f4870c08a46be698cec709b6
  patches:
    - 0001-Patch-Python-and-nanobind-cmake-config.patch
    - 0002-Link-protobuf-and-abseil-privately.patch

build:
  number: 0
  # Build a single abi3 (CPython stable ABI) artifact against python_min that
  # works on all newer CPython versions. The nanobind extension is compiled
  # with STABLE_ABI (see patch 0001 / upstream CMakeLists). Only the python_min
  # variant produces a package; the others are skipped.
  skip: is_abi3 and not is_python_min
  python:
    version_independent: ${{ is_abi3 }}
    entry_points:
      - check-model = onnx.bin.checker:check_model
      - check-node = onnx.bin.checker:check_node
      - backend-test-tools = onnx.backend.test.cmd_tools:main

requirements:
  build:
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - nanobind
        - libprotobuf
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - ${{ compiler('cxx') }}
    - cmake
    - ninja
    - if: unix
      then:
        - make
  host:
    - python
    - if: is_abi3
      then:
        - python-abi3
    - libprotobuf
    - pip
    - protobuf
    - nanobind
    # onnx 1.22 switched its build backend from setuptools to scikit-build-core
    - scikit-build-core
  run:
    - python
    - ml_dtypes
    - protobuf
    - typing_extensions

tests:
  - python:
      imports:
        - onnx
      # For the abi3 build, test the import on the minimum Python; the same
      # artifact is resolved for all newer versions at install time.
      python_version:
        - if: is_abi3
          then: ${{ python_min }}.*
        - "*"
  - requirements:
      run:
        - pip
    script:
      - pip check
      - check-model --help
      - check-node --help
      - backend-test-tools --help
      - if: unix
        then:
          - test -f "${PREFIX}/lib/libonnx${SHLIB_EXT}"
          - test -f "${PREFIX}/lib/libonnx_proto${SHLIB_EXT}"
          - test -f "${PREFIX}/lib/cmake/ONNX/ONNXConfig.cmake"
          - test -f "${PREFIX}/lib/cmake/ONNX/ONNXTargets.cmake"
          - grep -q protobuf "${PREFIX}/lib/cmake/ONNX/ONNXTargets.cmake" && exit 1 || true
  # Verify the compiled extension really only uses the limited / stable ABI.
  - if: is_abi3
    then:
      requirements:
        run:
          - abi3audit
      script:
        - if: unix
          then: abi3audit $SP_DIR/onnx/onnx_cpp2py_export*.so -s -v --assume-minimum-abi3 ${{ python_min }}

      # - if: win
      #   then:
      #     - if not exist "%LIBRARY_PREFIX%\\bin\\onnx.dll" exit 1
      #     - if not exist "%LIBRARY_PREFIX%\\bin\\onnx_proto.dll" exit 1
      #     - if not exist "%LIBRARY_PREFIX%\\lib\\onnx.lib" exit 1
      #     - if not exist "%LIBRARY_PREFIX%\\bin\\onnx_proto.lib" exit 1

about:
  license: Apache-2.0
  license_file: LICENSE
  summary: Open Neural Network Exchange library
  description: |
    Open Neural Network Exchange (ONNX) is the first step toward an open
    ecosystem that empowers AI developers to choose the right tools as their
    project evolves. ONNX provides an open source format for AI models. It
    defines an extensible computation graph model, as well as definitions of
    built-in operators and standard data types. Initially we focus on the
    capabilities needed for inferencing (evaluation).


  homepage: https://github.com/onnx/onnx/

extra:
  recipe-maintainers:
    - ezyang
    - marcelotrevisani
    - xhochy
    - janjagusch
    - cbourjau
